<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gửi Hoàng Một Chút Yêu Thương</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Quicksand:wght@500&display=swap" rel="stylesheet">
</head>
<body>

    <div class="container">
        <div class="decorations">
           <div class="decorations">
    <img src="https://www.pngmart.com/files/15/Hydrangea-Flower-PNG-Clipart.png" class="flower f-top-left" alt="flower">
    <img src="https://www.pngmart.com/files/1/Tulip-PNG-File.png" class="flower f-top-right" alt="flower">
    <img src="https://www.pngmart.com/files/22/Baby-Breath-Flower-PNG-Photos.png" class="flower f-bottom-left" alt="flower">
    <img src="https://www.pngmart.com/files/1/Sunflower-PNG-Transparent-Image.png" class="flower f-bottom-right" alt="flower">
</div>
        </div>

        <div class="envelope-wrapper" id="envelopeWrapper">
            <div class="hearts-container" id="heartsContainer"></div>
            
            <div class="envelope" onclick="openLetter()">
                <div class="flap"></div>
                <div class="front"></div>
                <div class="letter">
                    <div class="letter-content">
                        <h2 class="letter-title">DEAR SOMEONE</h2>
                        <p class="letter-text">
                             I hope you have a very special and joyful April. <br><br>
                             I wish you success in your upcoming exams. <br><br>
                            Try ur best , goodspeed 🌸
                        </p>
                        <p class="letter-footer">From : Camiuday ✨</p>
                    </div>
                </div>
            </div>
            <div class="hint">Click the envelope to open the letter!</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
